openapi: 3.0.3
info:
  title: Bitbucket Pull Request Comments
  description: MCP tools for managing pull request comments in Bitbucket Data Center and Cloud
  version: 1.0.0
  contact:
    name: Bitbucket MCP Server
    url: https://github.com/guercheLE/bitbucket-mcp-server

servers:
  - url: https://bitbucket.company.com/rest/api/1.0
    description: Bitbucket Data Center API
  - url: https://api.bitbucket.org/2.0
    description: Bitbucket Cloud API

paths:
  /projects/{projectKey}/repos/{repositorySlug}/pull-requests/{pullRequestId}/comments:
    get:
      summary: List pull request comments
      description: List all comments for a pull request
      operationId: listPullRequestComments
      parameters:
        - name: projectKey
          in: path
          required: true
          schema:
            type: string
          description: Project key
        - name: repositorySlug
          in: path
          required: true
          schema:
            type: string
          description: Repository slug
        - name: pullRequestId
          in: path
          required: true
          schema:
            type: integer
          description: Pull request ID
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 25
          description: Maximum number of results
        - name: start
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Start index for pagination
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  size:
                    type: integer
                  limit:
                    type: integer
                  isLastPage:
                    type: boolean
                  values:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: Create pull request comment
      description: Create a new comment on a pull request
      operationId: createPullRequestComment
      parameters:
        - name: projectKey
          in: path
          required: true
          schema:
            type: string
          description: Project key
        - name: repositorySlug
          in: path
          required: true
          schema:
            type: string
          description: Repository slug
        - name: pullRequestId
          in: path
          required: true
          schema:
            type: integer
          description: Pull request ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectKey}/repos/{repositorySlug}/pull-requests/{pullRequestId}/comments/{commentId}:
    get:
      summary: Get pull request comment
      description: Get a specific comment by ID
      operationId: getPullRequestComment
      parameters:
        - name: projectKey
          in: path
          required: true
          schema:
            type: string
          description: Project key
        - name: repositorySlug
          in: path
          required: true
          schema:
            type: string
          description: Repository slug
        - name: pullRequestId
          in: path
          required: true
          schema:
            type: integer
          description: Pull request ID
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
          description: Comment ID
      responses:
        '200':
          description: Comment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: Update pull request comment
      description: Update an existing comment
      operationId: updatePullRequestComment
      parameters:
        - name: projectKey
          in: path
          required: true
          schema:
            type: string
          description: Project key
        - name: repositorySlug
          in: path
          required: true
          schema:
            type: string
          description: Repository slug
        - name: pullRequestId
          in: path
          required: true
          schema:
            type: integer
          description: Pull request ID
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
          description: Comment ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Delete pull request comment
      description: Delete a comment
      operationId: deletePullRequestComment
      parameters:
        - name: projectKey
          in: path
          required: true
          schema:
            type: string
          description: Project key
        - name: repositorySlug
          in: path
          required: true
          schema:
            type: string
          description: Repository slug
        - name: pullRequestId
          in: path
          required: true
          schema:
            type: integer
          description: Pull request ID
        - name: commentId
          in: path
          required: true
          schema:
            type: integer
          description: Comment ID
      responses:
        '204':
          description: Comment deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    Comment:
      type: object
      required:
        - id
        - version
        - text
        - author
        - createdDate
      properties:
        id:
          type: integer
          description: Comment ID
        version:
          type: integer
          description: Version for optimistic locking
        text:
          type: string
          maxLength: 32768
          description: Comment text
        author:
          $ref: '#/components/schemas/User'
        createdDate:
          type: string
          format: date-time
          description: Creation timestamp
        updatedDate:
          type: string
          format: date-time
          description: Last update timestamp
        parent:
          $ref: '#/components/schemas/Comment'
        comments:
          type: array
          items:
            $ref: '#/components/schemas/Comment'
        anchor:
          $ref: '#/components/schemas/CommentAnchor'
        deleted:
          type: boolean
          description: Whether the comment was deleted
        severity:
          type: string
          enum: [NORMAL, BLOCKER, WARNING]
          description: Comment severity
        links:
          $ref: '#/components/schemas/Links'

    CreateCommentRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          maxLength: 32768
          description: Comment text
        parent:
          type: object
          properties:
            id:
              type: integer
              description: Parent comment ID
        anchor:
          $ref: '#/components/schemas/CommentAnchor'
        severity:
          type: string
          enum: [NORMAL, BLOCKER, WARNING]
          default: NORMAL
          description: Comment severity

    UpdateCommentRequest:
      type: object
      required:
        - version
        - text
      properties:
        version:
          type: integer
          description: Version for optimistic locking
        text:
          type: string
          maxLength: 32768
          description: Comment text
        severity:
          type: string
          enum: [NORMAL, BLOCKER, WARNING]
          description: Comment severity

    CommentAnchor:
      type: object
      required:
        - line
        - lineType
        - fileType
        - path
      properties:
        line:
          type: integer
          minimum: 1
          description: Line number
        lineType:
          type: string
          enum: [ADDED, REMOVED, CONTEXT]
          description: Type of line
        fileType:
          type: string
          enum: [FROM, TO]
          description: File type
        path:
          type: string
          description: File path
        srcPath:
          type: string
          description: Source file path (if different)

    User:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Username
        emailAddress:
          type: string
          format: email
          description: Email address
        id:
          type: integer
          description: User ID (Data Center)
        slug:
          type: string
          description: User slug (Cloud)
        displayName:
          type: string
          description: Display name
        active:
          type: boolean
          description: Whether the user is active
        type:
          type: string
          description: User type
        links:
          $ref: '#/components/schemas/Links'

    Links:
      type: object
      additionalProperties:
        type: array
        items:
          $ref: '#/components/schemas/Link'

    Link:
      type: object
      required:
        - href
      properties:
        href:
          type: string
          format: uri
          description: Link URL
        name:
          type: string
          description: Link name

    Error:
      type: object
      required:
        - errors
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              context:
                type: string
                description: Error context
              message:
                type: string
                description: Error message
              exceptionName:
                type: string
                description: Exception name

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
