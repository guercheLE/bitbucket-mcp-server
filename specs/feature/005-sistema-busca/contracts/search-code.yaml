openapi: 3.0.3
info:
  title: Bitbucket Search - Code
  description: MCP tool for searching code in Bitbucket repositories
  version: 1.0.0
  contact:
    name: Bitbucket MCP Server
    url: https://github.com/guercheLE/bitbucket-mcp-server

servers:
  - url: mcp://bitbucket-search
    description: MCP Server for Bitbucket Search

paths:
  /search/code:
    get:
      summary: Search code
      description: Search for code in Bitbucket repositories with filters and pagination
      operationId: searchCode
      parameters:
        - name: query
          in: query
          required: true
          description: Search query string
          schema:
            type: string
            minLength: 1
            maxLength: 500
            example: "function authenticate"
        - name: projectKey
          in: query
          required: false
          description: Filter by project key (Data Center only)
          schema:
            type: string
            example: "PROJ"
        - name: workspace
          in: query
          required: false
          description: Filter by workspace (Cloud only)
          schema:
            type: string
            example: "my-workspace"
        - name: repositorySlug
          in: query
          required: false
          description: Filter by repository slug
          schema:
            type: string
            example: "my-repo"
        - name: fileExtension
          in: query
          required: false
          description: Filter by file extension
          schema:
            type: string
            example: ".ts"
        - name: language
          in: query
          required: false
          description: Filter by programming language
          schema:
            type: string
            example: "typescript"
        - name: filePath
          in: query
          required: false
          description: Filter by file path pattern
          schema:
            type: string
            example: "src/auth/"
        - name: fromDate
          in: query
          required: false
          description: Filter files modified from this date (ISO 8601)
          schema:
            type: string
            format: date-time
            example: "2024-01-01T00:00:00Z"
        - name: toDate
          in: query
          required: false
          description: Filter files modified to this date (ISO 8601)
          schema:
            type: string
            format: date-time
            example: "2024-12-31T23:59:59Z"
        - name: sortBy
          in: query
          required: false
          description: Sort field
          schema:
            type: string
            enum: [filePath, lastModified, relevance]
            default: "relevance"
        - name: sortOrder
          in: query
          required: false
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: "desc"
        - name: page
          in: query
          required: false
          description: Page number (0-based)
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          required: false
          description: Results per page
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 25
      responses:
        '200':
          description: Successful search response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              example:
                results:
                  - type: "code"
                    id: "src/auth/authenticate.ts:45"
                    title: "authenticate function in src/auth/authenticate.ts"
                    description: "function authenticate(user: User, password: string): Promise<AuthResult>"
                    url: "https://bitbucket.company.com/projects/PROJ/repos/my-repo/src/src/auth/authenticate.ts"
                    metadata:
                      projectKey: "PROJ"
                      repositorySlug: "my-repo"
                      filePath: "src/auth/authenticate.ts"
                      lineNumber: 45
                      language: "typescript"
                      context: "export async function authenticate(user: User, password: string): Promise<AuthResult> {\n  // Validate user credentials\n  const isValid = await validateCredentials(user, password);\n  if (!isValid) {\n    throw new AuthenticationError('Invalid credentials');\n  }\n  \n  // Generate JWT token\n  const token = await generateToken(user);\n  return { token, user };\n}"
                    relevanceScore: 0.95
                pagination:
                  page: 0
                  limit: 25
                  totalPages: 1
                  hasNext: false
                  hasPrevious: false
                totalCount: 1
                searchTime: 300
                suggestions: ["function", "authenticate", "auth", "login"]
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SearchResponse:
      type: object
      required:
        - results
        - pagination
        - totalCount
        - searchTime
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        pagination:
          $ref: '#/components/schemas/SearchPagination'
        totalCount:
          type: integer
          minimum: 0
          description: Total number of results
        searchTime:
          type: number
          minimum: 0
          description: Search execution time in milliseconds
        suggestions:
          type: array
          items:
            type: string
          description: Search suggestions based on query

    SearchResult:
      type: object
      required:
        - type
        - id
        - title
        - url
        - metadata
        - relevanceScore
      properties:
        type:
          type: string
          enum: [repository, commit, pullrequest, code, user]
          description: Type of search result
        id:
          type: string
          description: Unique identifier (file:line)
        title:
          type: string
          maxLength: 200
          description: Code snippet title
        description:
          type: string
          maxLength: 500
          description: Code snippet description
        url:
          type: string
          format: uri
          description: URL to access the file
        metadata:
          $ref: '#/components/schemas/CodeMetadata'
        relevanceScore:
          type: number
          minimum: 0
          maximum: 1
          description: Relevance score (0-1)

    CodeMetadata:
      type: object
      properties:
        projectKey:
          type: string
          description: Project key (Data Center)
        workspace:
          type: string
          description: Workspace (Cloud)
        repositorySlug:
          type: string
          description: Repository slug
        filePath:
          type: string
          description: File path
        lineNumber:
          type: integer
          minimum: 1
          description: Line number where code was found
        language:
          type: string
          description: Programming language
        context:
          type: string
          description: Code context around the match

    SearchPagination:
      type: object
      required:
        - page
        - limit
        - totalPages
        - hasNext
        - hasPrevious
      properties:
        page:
          type: integer
          minimum: 0
          description: Current page number
        limit:
          type: integer
          minimum: 1
          description: Results per page
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages
        hasNext:
          type: boolean
          description: Whether there is a next page
        hasPrevious:
          type: boolean
          description: Whether there is a previous page
        nextPage:
          type: integer
          description: Next page number (if available)
        previousPage:
          type: integer
          description: Previous page number (if available)

    ErrorResponse:
      type: object
      required:
        - error
        - message
        - timestamp
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Error message
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
        details:
          type: object
          description: Additional error details
        correlationId:
          type: string
          description: Request correlation ID
