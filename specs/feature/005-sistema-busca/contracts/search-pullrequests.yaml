openapi: 3.0.3
info:
  title: Bitbucket Search - Pull Requests
  description: MCP tool for searching pull requests in Bitbucket
  version: 1.0.0
  contact:
    name: Bitbucket MCP Server
    url: https://github.com/guercheLE/bitbucket-mcp-server

servers:
  - url: mcp://bitbucket-search
    description: MCP Server for Bitbucket Search

paths:
  /search/pullrequests:
    get:
      summary: Search pull requests
      description: Search for pull requests in Bitbucket with filters and pagination
      operationId: searchPullRequests
      parameters:
        - name: query
          in: query
          required: true
          description: Search query string
          schema:
            type: string
            minLength: 1
            maxLength: 500
            example: "bug fix"
        - name: projectKey
          in: query
          required: false
          description: Filter by project key (Data Center only)
          schema:
            type: string
            example: "PROJ"
        - name: workspace
          in: query
          required: false
          description: Filter by workspace (Cloud only)
          schema:
            type: string
            example: "my-workspace"
        - name: repositorySlug
          in: query
          required: false
          description: Filter by repository slug
          schema:
            type: string
            example: "my-repo"
        - name: state
          in: query
          required: false
          description: Filter by pull request state
          schema:
            type: string
            enum: [OPEN, MERGED, DECLINED, SUPERSEDED]
            example: "OPEN"
        - name: author
          in: query
          required: false
          description: Filter by pull request author
          schema:
            type: string
            example: "joao.silva"
        - name: reviewer
          in: query
          required: false
          description: Filter by pull request reviewer
          schema:
            type: string
            example: "maria.santos"
        - name: fromDate
          in: query
          required: false
          description: Filter pull requests from this date (ISO 8601)
          schema:
            type: string
            format: date-time
            example: "2024-01-01T00:00:00Z"
        - name: toDate
          in: query
          required: false
          description: Filter pull requests to this date (ISO 8601)
          schema:
            type: string
            format: date-time
            example: "2024-12-31T23:59:59Z"
        - name: sortBy
          in: query
          required: false
          description: Sort field
          schema:
            type: string
            enum: [createdDate, updatedDate, title, author]
            default: "updatedDate"
        - name: sortOrder
          in: query
          required: false
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: "desc"
        - name: page
          in: query
          required: false
          description: Page number (0-based)
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          required: false
          description: Results per page
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 25
      responses:
        '200':
          description: Successful search response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              example:
                results:
                  - type: "pullrequest"
                    id: "123"
                    title: "Fix critical authentication bug"
                    description: "This PR fixes a critical bug in the authentication system that was causing login failures for users with special characters in their passwords."
                    url: "https://bitbucket.company.com/projects/PROJ/repos/my-repo/pull-requests/123"
                    metadata:
                      projectKey: "PROJ"
                      repositorySlug: "my-repo"
                      state: "OPEN"
                      author: "joao.silva"
                      createdDate: "2024-12-19T10:30:00Z"
                      updatedDate: "2024-12-19T15:45:00Z"
                      reviewers: ["maria.santos", "pedro.oliveira"]
                    relevanceScore: 0.88
                pagination:
                  page: 0
                  limit: 25
                  totalPages: 1
                  hasNext: false
                  hasPrevious: false
                totalCount: 1
                searchTime: 180
                suggestions: ["fix", "bug", "authentication", "critical"]
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SearchResponse:
      type: object
      required:
        - results
        - pagination
        - totalCount
        - searchTime
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        pagination:
          $ref: '#/components/schemas/SearchPagination'
        totalCount:
          type: integer
          minimum: 0
          description: Total number of results
        searchTime:
          type: number
          minimum: 0
          description: Search execution time in milliseconds
        suggestions:
          type: array
          items:
            type: string
          description: Search suggestions based on query

    SearchResult:
      type: object
      required:
        - type
        - id
        - title
        - url
        - metadata
        - relevanceScore
      properties:
        type:
          type: string
          enum: [repository, commit, pullrequest, code, user]
          description: Type of search result
        id:
          type: string
          description: Unique identifier (pull request ID)
        title:
          type: string
          maxLength: 200
          description: Pull request title
        description:
          type: string
          maxLength: 500
          description: Pull request description
        url:
          type: string
          format: uri
          description: URL to access the pull request
        metadata:
          $ref: '#/components/schemas/PullRequestMetadata'
        relevanceScore:
          type: number
          minimum: 0
          maximum: 1
          description: Relevance score (0-1)

    PullRequestMetadata:
      type: object
      properties:
        projectKey:
          type: string
          description: Project key (Data Center)
        workspace:
          type: string
          description: Workspace (Cloud)
        repositorySlug:
          type: string
          description: Repository slug
        state:
          type: string
          enum: [OPEN, MERGED, DECLINED, SUPERSEDED]
          description: Pull request state
        author:
          type: string
          description: Pull request author username
        createdDate:
          type: string
          format: date-time
          description: Creation date
        updatedDate:
          type: string
          format: date-time
          description: Last update date
        reviewers:
          type: array
          items:
            type: string
          description: List of reviewer usernames

    SearchPagination:
      type: object
      required:
        - page
        - limit
        - totalPages
        - hasNext
        - hasPrevious
      properties:
        page:
          type: integer
          minimum: 0
          description: Current page number
        limit:
          type: integer
          minimum: 1
          description: Results per page
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages
        hasNext:
          type: boolean
          description: Whether there is a next page
        hasPrevious:
          type: boolean
          description: Whether there is a previous page
        nextPage:
          type: integer
          description: Next page number (if available)
        previousPage:
          type: integer
          description: Previous page number (if available)

    ErrorResponse:
      type: object
      required:
        - error
        - message
        - timestamp
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Error message
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
        details:
          type: object
          description: Additional error details
        correlationId:
          type: string
          description: Request correlation ID
