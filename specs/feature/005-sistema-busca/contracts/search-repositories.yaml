openapi: 3.0.3
info:
  title: Bitbucket Search - Repositories
  description: MCP tool for searching repositories in Bitbucket
  version: 1.0.0
  contact:
    name: Bitbucket MCP Server
    url: https://github.com/guercheLE/bitbucket-mcp-server

servers:
  - url: mcp://bitbucket-search
    description: MCP Server for Bitbucket Search

paths:
  /search/repositories:
    get:
      summary: Search repositories
      description: Search for repositories in Bitbucket with filters and pagination
      operationId: searchRepositories
      parameters:
        - name: query
          in: query
          required: true
          description: Search query string
          schema:
            type: string
            minLength: 1
            maxLength: 500
            example: "api"
        - name: projectKey
          in: query
          required: false
          description: Filter by project key (Data Center only)
          schema:
            type: string
            example: "PROJ"
        - name: workspace
          in: query
          required: false
          description: Filter by workspace (Cloud only)
          schema:
            type: string
            example: "my-workspace"
        - name: repositorySlug
          in: query
          required: false
          description: Filter by repository slug
          schema:
            type: string
            example: "my-repo"
        - name: isPublic
          in: query
          required: false
          description: Filter by public/private repositories
          schema:
            type: boolean
            example: true
        - name: language
          in: query
          required: false
          description: Filter by programming language
          schema:
            type: string
            example: "javascript"
        - name: sortBy
          in: query
          required: false
          description: Sort field
          schema:
            type: string
            enum: [name, lastModified, size, language]
            default: "lastModified"
        - name: sortOrder
          in: query
          required: false
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: "desc"
        - name: page
          in: query
          required: false
          description: Page number (0-based)
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          required: false
          description: Results per page
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 25
      responses:
        '200':
          description: Successful search response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              example:
                results:
                  - type: "repository"
                    id: "PROJ_my-repo"
                    title: "My API Repository"
                    description: "Repository containing API implementation"
                    url: "https://bitbucket.company.com/projects/PROJ/repos/my-repo"
                    metadata:
                      projectKey: "PROJ"
                      repositorySlug: "my-repo"
                      isPublic: false
                      language: "typescript"
                      size: 1024000
                      lastModified: "2024-12-19T10:30:00Z"
                    relevanceScore: 0.95
                pagination:
                  page: 0
                  limit: 25
                  totalPages: 1
                  hasNext: false
                  hasPrevious: false
                totalCount: 1
                searchTime: 150
                suggestions: ["api", "rest", "graphql"]
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SearchResponse:
      type: object
      required:
        - results
        - pagination
        - totalCount
        - searchTime
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        pagination:
          $ref: '#/components/schemas/SearchPagination'
        totalCount:
          type: integer
          minimum: 0
          description: Total number of results
        searchTime:
          type: number
          minimum: 0
          description: Search execution time in milliseconds
        suggestions:
          type: array
          items:
            type: string
          description: Search suggestions based on query

    SearchResult:
      type: object
      required:
        - type
        - id
        - title
        - url
        - metadata
        - relevanceScore
      properties:
        type:
          type: string
          enum: [repository, commit, pullrequest, code, user]
          description: Type of search result
        id:
          type: string
          description: Unique identifier
        title:
          type: string
          maxLength: 200
          description: Title or name
        description:
          type: string
          maxLength: 500
          description: Description or summary
        url:
          type: string
          format: uri
          description: URL to access the item
        metadata:
          $ref: '#/components/schemas/RepositoryMetadata'
        relevanceScore:
          type: number
          minimum: 0
          maximum: 1
          description: Relevance score (0-1)

    RepositoryMetadata:
      type: object
      properties:
        projectKey:
          type: string
          description: Project key (Data Center)
        workspace:
          type: string
          description: Workspace (Cloud)
        repositorySlug:
          type: string
          description: Repository slug
        isPublic:
          type: boolean
          description: Whether repository is public
        language:
          type: string
          description: Primary programming language
        size:
          type: integer
          minimum: 0
          description: Repository size in bytes
        lastModified:
          type: string
          format: date-time
          description: Last modification date

    SearchPagination:
      type: object
      required:
        - page
        - limit
        - totalPages
        - hasNext
        - hasPrevious
      properties:
        page:
          type: integer
          minimum: 0
          description: Current page number
        limit:
          type: integer
          minimum: 1
          description: Results per page
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages
        hasNext:
          type: boolean
          description: Whether there is a next page
        hasPrevious:
          type: boolean
          description: Whether there is a previous page
        nextPage:
          type: integer
          description: Next page number (if available)
        previousPage:
          type: integer
          description: Previous page number (if available)

    ErrorResponse:
      type: object
      required:
        - error
        - message
        - timestamp
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Error message
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
        details:
          type: object
          description: Additional error details
        correlationId:
          type: string
          description: Request correlation ID
