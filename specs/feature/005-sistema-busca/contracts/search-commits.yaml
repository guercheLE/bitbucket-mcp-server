openapi: 3.0.3
info:
  title: Bitbucket Search - Commits
  description: MCP tool for searching commits in Bitbucket
  version: 1.0.0
  contact:
    name: Bitbucket MCP Server
    url: https://github.com/guercheLE/bitbucket-mcp-server

servers:
  - url: mcp://bitbucket-search
    description: MCP Server for Bitbucket Search

paths:
  /search/commits:
    get:
      summary: Search commits
      description: Search for commits in Bitbucket with filters and pagination
      operationId: searchCommits
      parameters:
        - name: query
          in: query
          required: true
          description: Search query string
          schema:
            type: string
            minLength: 1
            maxLength: 500
            example: "fix bug"
        - name: projectKey
          in: query
          required: false
          description: Filter by project key (Data Center only)
          schema:
            type: string
            example: "PROJ"
        - name: workspace
          in: query
          required: false
          description: Filter by workspace (Cloud only)
          schema:
            type: string
            example: "my-workspace"
        - name: repositorySlug
          in: query
          required: false
          description: Filter by repository slug
          schema:
            type: string
            example: "my-repo"
        - name: author
          in: query
          required: false
          description: Filter by commit author
          schema:
            type: string
            example: "joao.silva"
        - name: committer
          in: query
          required: false
          description: Filter by commit committer
          schema:
            type: string
            example: "maria.santos"
        - name: fromDate
          in: query
          required: false
          description: Filter commits from this date (ISO 8601)
          schema:
            type: string
            format: date-time
            example: "2024-01-01T00:00:00Z"
        - name: toDate
          in: query
          required: false
          description: Filter commits to this date (ISO 8601)
          schema:
            type: string
            format: date-time
            example: "2024-12-31T23:59:59Z"
        - name: sortBy
          in: query
          required: false
          description: Sort field
          schema:
            type: string
            enum: [commitDate, author, message]
            default: "commitDate"
        - name: sortOrder
          in: query
          required: false
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: "desc"
        - name: page
          in: query
          required: false
          description: Page number (0-based)
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: limit
          in: query
          required: false
          description: Results per page
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 25
      responses:
        '200':
          description: Successful search response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              example:
                results:
                  - type: "commit"
                    id: "abc123def456"
                    title: "Fix authentication bug in login flow"
                    description: "Fixed issue where users couldn't login with special characters in password"
                    url: "https://bitbucket.company.com/projects/PROJ/repos/my-repo/commits/abc123def456"
                    metadata:
                      projectKey: "PROJ"
                      repositorySlug: "my-repo"
                      author: "joao.silva"
                      committer: "joao.silva"
                      commitDate: "2024-12-19T10:30:00Z"
                      message: "Fix authentication bug in login flow\n\n- Updated password validation regex\n- Added tests for special characters\n- Fixed edge case in token generation"
                    relevanceScore: 0.92
                pagination:
                  page: 0
                  limit: 25
                  totalPages: 1
                  hasNext: false
                  hasPrevious: false
                totalCount: 1
                searchTime: 200
                suggestions: ["fix", "bug", "authentication", "login"]
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    SearchResponse:
      type: object
      required:
        - results
        - pagination
        - totalCount
        - searchTime
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResult'
        pagination:
          $ref: '#/components/schemas/SearchPagination'
        totalCount:
          type: integer
          minimum: 0
          description: Total number of results
        searchTime:
          type: number
          minimum: 0
          description: Search execution time in milliseconds
        suggestions:
          type: array
          items:
            type: string
          description: Search suggestions based on query

    SearchResult:
      type: object
      required:
        - type
        - id
        - title
        - url
        - metadata
        - relevanceScore
      properties:
        type:
          type: string
          enum: [repository, commit, pullrequest, code, user]
          description: Type of search result
        id:
          type: string
          description: Unique identifier (commit hash)
        title:
          type: string
          maxLength: 200
          description: Commit message title
        description:
          type: string
          maxLength: 500
          description: Full commit message
        url:
          type: string
          format: uri
          description: URL to access the commit
        metadata:
          $ref: '#/components/schemas/CommitMetadata'
        relevanceScore:
          type: number
          minimum: 0
          maximum: 1
          description: Relevance score (0-1)

    CommitMetadata:
      type: object
      properties:
        projectKey:
          type: string
          description: Project key (Data Center)
        workspace:
          type: string
          description: Workspace (Cloud)
        repositorySlug:
          type: string
          description: Repository slug
        author:
          type: string
          description: Commit author username
        committer:
          type: string
          description: Commit committer username
        commitDate:
          type: string
          format: date-time
          description: Commit date
        message:
          type: string
          description: Full commit message

    SearchPagination:
      type: object
      required:
        - page
        - limit
        - totalPages
        - hasNext
        - hasPrevious
      properties:
        page:
          type: integer
          minimum: 0
          description: Current page number
        limit:
          type: integer
          minimum: 1
          description: Results per page
        totalPages:
          type: integer
          minimum: 0
          description: Total number of pages
        hasNext:
          type: boolean
          description: Whether there is a next page
        hasPrevious:
          type: boolean
          description: Whether there is a previous page
        nextPage:
          type: integer
          description: Next page number (if available)
        previousPage:
          type: integer
          description: Previous page number (if available)

    ErrorResponse:
      type: object
      required:
        - error
        - message
        - timestamp
      properties:
        error:
          type: string
          description: Error code
        message:
          type: string
          description: Error message
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
        details:
          type: object
          description: Additional error details
        correlationId:
          type: string
          description: Request correlation ID
