openapi: 3.0.3
info:
  title: OAuth Token Exchange API
  description: OAuth 2.0 token exchange endpoint for Bitbucket authentication
  version: 1.0.0
  contact:
    name: Bitbucket MCP Server
    url: https://github.com/guercheLE/bitbucket-mcp-server

servers:
  - url: https://bitbucket.company.com/rest/api/1.0
    description: Bitbucket Data Center
  - url: https://api.bitbucket.org/2.0
    description: Bitbucket Cloud

paths:
  /oauth/access_token:
    post:
      summary: Exchange authorization code for access token
      description: Exchange OAuth 2.0 authorization code for access token using PKCE
      operationId: exchangeOAuthToken
      tags:
        - Authentication
        - OAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthTokenRequest'
            examples:
              authorization_code:
                summary: Authorization Code Flow
                value:
                  grant_type: "authorization_code"
                  code: "abc123def456"
                  redirect_uri: "https://app.example.com/callback"
                  client_id: "your_client_id"
                  client_secret: "your_client_secret"
                  code_verifier: "dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk"
              refresh_token:
                summary: Refresh Token Flow
                value:
                  grant_type: "refresh_token"
                  refresh_token: "def456ghi789"
                  client_id: "your_client_id"
                  client_secret: "your_client_secret"
      responses:
        '200':
          description: Token exchange successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenResponse'
              examples:
                success:
                  summary: Successful token exchange
                  value:
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    token_type: "Bearer"
                    expires_in: 3600
                    refresh_token: "def456ghi789"
                    scope: "read write"
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_grant:
                  summary: Invalid authorization code
                  value:
                    error: "invalid_grant"
                    error_description: "The authorization code is invalid or expired"
                invalid_client:
                  summary: Invalid client credentials
                  value:
                    error: "invalid_client"
                    error_description: "Client authentication failed"
        '401':
          description: Unauthorized - invalid client credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    OAuthTokenRequest:
      type: object
      required:
        - grant_type
        - client_id
        - client_secret
      properties:
        grant_type:
          type: string
          enum: [authorization_code, refresh_token, client_credentials]
          description: OAuth 2.0 grant type
        code:
          type: string
          description: Authorization code (required for authorization_code grant)
        redirect_uri:
          type: string
          format: uri
          description: Redirect URI (required for authorization_code grant)
        client_id:
          type: string
          description: OAuth client identifier
        client_secret:
          type: string
          description: OAuth client secret
        refresh_token:
          type: string
          description: Refresh token (required for refresh_token grant)
        code_verifier:
          type: string
          description: PKCE code verifier (required for authorization_code grant with PKCE)
        scope:
          type: string
          description: Requested scope (optional)
      example:
        grant_type: "authorization_code"
        code: "abc123def456"
        redirect_uri: "https://app.example.com/callback"
        client_id: "your_client_id"
        client_secret: "your_client_secret"
        code_verifier: "dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk"

    OAuthTokenResponse:
      type: object
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: OAuth 2.0 access token
        token_type:
          type: string
          enum: [Bearer]
          description: Token type
        expires_in:
          type: integer
          minimum: 1
          description: Token expiration time in seconds
        refresh_token:
          type: string
          description: OAuth 2.0 refresh token
        scope:
          type: string
          description: Granted scope
        user_id:
          type: string
          description: Bitbucket user identifier
        username:
          type: string
          description: Bitbucket username
      example:
        access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        token_type: "Bearer"
        expires_in: 3600
        refresh_token: "def456ghi789"
        scope: "read write"
        user_id: "12345"
        username: "john.doe"

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error code
        error_description:
          type: string
          description: Human-readable error description
        error_uri:
          type: string
          format: uri
          description: URI with additional error information
      example:
        error: "invalid_grant"
        error_description: "The authorization code is invalid or expired"

  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://bitbucket.company.com/oauth/authorize
          tokenUrl: https://bitbucket.company.com/oauth/access_token
          scopes:
            read: Read access to repositories
            write: Write access to repositories
            admin: Administrative access
        clientCredentials:
          tokenUrl: https://bitbucket.company.com/oauth/access_token
          scopes:
            read: Read access to repositories
            write: Write access to repositories
            admin: Administrative access

security:
  - OAuth2: [read, write]
