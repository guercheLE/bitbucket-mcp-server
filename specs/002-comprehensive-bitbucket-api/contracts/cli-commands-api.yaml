openapi: 3.0.3
info:
  title: Bitbucket MCP CLI Commands API
  description: API dos comandos CLI do cliente console integrado
  version: 1.0.0

paths:
  /cli/auth/login:
    post:
      summary: Autenticar no Bitbucket
      description: Autentica no servidor Bitbucket usando método configurado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                  enum: [oauth, app_password, api_token, basic]
                  description: Método de autenticação
                credentials:
                  type: object
                  description: Credenciais baseadas no método
              required:
                - method
                - credentials
      responses:
        '200':
          description: Autenticação bem-sucedida
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Credenciais inválidas
        '400':
          description: Método de autenticação inválido

  /cli/auth/logout:
    post:
      summary: Desautenticar
      description: Remove credenciais de autenticação
      responses:
        '200':
          description: Logout bem-sucedido
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

  /cli/repository/list:
    get:
      summary: Listar repositórios
      description: Lista repositórios do workspace/projeto
      parameters:
        - name: workspace
          in: query
          schema:
            type: string
          description: Workspace (Cloud) ou Project (Data Center)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Limite de resultados
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Página
      responses:
        '200':
          description: Lista de repositórios
          content:
            application/json:
              schema:
                type: object
                properties:
                  repositories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Repository'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /cli/repository/create:
    post:
      summary: Criar repositório
      description: Cria um novo repositório
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Nome do repositório
                description:
                  type: string
                  description: Descrição do repositório
                isPrivate:
                  type: boolean
                  default: true
                  description: Se o repositório é privado
                workspace:
                  type: string
                  description: Workspace (Cloud) ou Project (Data Center)
              required:
                - name
                - workspace
      responses:
        '201':
          description: Repositório criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Repository'
        '400':
          description: Dados inválidos
        '409':
          description: Repositório já existe

  /cli/repository/get:
    get:
      summary: Obter repositório
      description: Obtém informações de um repositório específico
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
          description: Workspace (Cloud) ou Project (Data Center)
        - name: repository
          in: query
          required: true
          schema:
            type: string
          description: Nome do repositório
      responses:
        '200':
          description: Informações do repositório
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Repository'
        '404':
          description: Repositório não encontrado

  /cli/repository/update:
    put:
      summary: Atualizar repositório
      description: Atualiza informações de um repositório
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                isPrivate:
                  type: boolean
      responses:
        '200':
          description: Repositório atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Repository'
        '404':
          description: Repositório não encontrado

  /cli/repository/delete:
    delete:
      summary: Deletar repositório
      description: Remove um repositório
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Repositório deletado
        '404':
          description: Repositório não encontrado

  /cli/pull-request/list:
    get:
      summary: Listar pull requests
      description: Lista pull requests de um repositório
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [open, merged, declined, superseded]
          description: Estado do pull request
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Lista de pull requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  pullRequests:
                    type: array
                    items:
                      $ref: '#/components/schemas/PullRequest'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /cli/pull-request/create:
    post:
      summary: Criar pull request
      description: Cria um novo pull request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Título do pull request
                description:
                  type: string
                  description: Descrição do pull request
                sourceBranch:
                  type: string
                  description: Branch de origem
                destinationBranch:
                  type: string
                  description: Branch de destino
                workspace:
                  type: string
                  description: Workspace (Cloud) ou Project (Data Center)
                repository:
                  type: string
                  description: Nome do repositório
                reviewers:
                  type: array
                  items:
                    type: string
                  description: Lista de revisores
              required:
                - title
                - sourceBranch
                - destinationBranch
                - workspace
                - repository
      responses:
        '201':
          description: Pull request criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullRequest'
        '400':
          description: Dados inválidos

  /cli/pull-request/merge:
    post:
      summary: Fazer merge do pull request
      description: Faz merge de um pull request
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
        - name: pullRequestId
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mergeStrategy:
                  type: string
                  enum: [merge_commit, squash, fast_forward]
                  default: merge_commit
                message:
                  type: string
                  description: Mensagem de merge
      responses:
        '200':
          description: Merge realizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullRequest'
        '404':
          description: Pull request não encontrado
        '409':
          description: Não é possível fazer merge

  /cli/project/list:
    get:
      summary: Listar projetos (Data Center)
      description: Lista projetos do Data Center
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Lista de projetos
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: Operação não suportada (Cloud)

  /cli/issue/list:
    get:
      summary: Listar issues (Cloud)
      description: Lista issues de um repositório
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [new, open, resolved, on_hold, invalid, duplicate, wontfix, closed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Lista de issues
          content:
            application/json:
              schema:
                type: object
                properties:
                  issues:
                    type: array
                    items:
                      $ref: '#/components/schemas/Issue'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: Operação não suportada (Data Center)

  /cli/branch/list:
    get:
      summary: Listar branches
      description: Lista branches de um repositório
      parameters:
        - name: workspace
