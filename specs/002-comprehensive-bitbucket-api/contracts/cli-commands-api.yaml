  /cli/pull-request/update:
    put:
      summary: Atualizar pull request
      description: Atualiza um pull request existente
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
        - name: pullRequestId
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                reviewers:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Pull request atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullRequest'
        '404':
          description: Pull request não encontrado

  /cli/pull-request/decline:
    post:
      summary: Recusar pull request
      description: Recusa um pull request
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
        - name: pullRequestId
          in: query
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Motivo da recusa
      responses:
        '200':
          description: Pull request recusado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullRequest'
        '404':
          description: Pull request não encontrado

  /cli/pull-request/reopen:
    post:
      summary: Reabrir pull request
      description: Reabre um pull request recusado
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
        - name: pullRequestId
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Pull request reaberto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PullRequest'
        '404':
          description: Pull request não encontrado

  /cli/branch/delete:
    delete:
      summary: Deletar branch
      description: Remove uma branch
      parameters:
        - name: workspace
          in: query
          required: true
