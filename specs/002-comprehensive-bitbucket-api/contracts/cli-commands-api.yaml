  /cli/branch/create:
    post:
      summary: Criar branch
      description: Cria uma nova branch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Nome da branch
                startPoint:
                  type: string
                  description: Ponto de partida (commit ou branch)
                workspace:
                  type: string
                  description: Workspace (Cloud) ou Project (Data Center)
                repository:
                  type: string
                  description: Nome do repositório
              required:
                - name
                - startPoint
                - workspace
                - repository
      responses:
        '201':
          description: Branch criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Branch'
        '400':
          description: Dados inválidos

  /cli/tag/list:
    get:
      summary: Listar tags
      description: Lista tags de um repositório
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
