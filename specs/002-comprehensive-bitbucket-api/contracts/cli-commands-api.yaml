components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
        accountStatus:
          type: string
          enum: [active, inactive, closed]
      required:
        - id
        - username
        - displayName
        - accountStatus

    Repository:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        fullName:
          type: string
        description:
          type: string
        isPrivate:
          type: boolean
        workspace:
          type: string
        project:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        links:
          type: object
          properties:
            clone:
              type: array
              items:
                type: object
                properties:
                  href:
                    type: string
                  name:
                    type: string
            self:
              type: object
              properties:
                href:
                  type: string
      required:
        - id
        - name
        - fullName
        - isPrivate
        - createdAt
        - updatedAt

    PullRequest:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        state:
          type: string
          enum: [open, merged, declined, superseded]
        sourceBranch:
          type: string
        destinationBranch:
          type: string
        author:
          $ref: '#/components/schemas/User'
        reviewers:
          type: array
          items:
            $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        repository:
          $ref: '#/components/schemas/Repository'
      required:
        - id
        - title
        - state
        - sourceBranch
        - destinationBranch
        - author
        - createdAt
        - updatedAt

    Project:
      type: object
      properties:
        key:
          type: string
        name:
          type: string
        description:
          type: string
        isPublic:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        links:
          type: object
          properties:
            self:
              type: object
              properties:
                href:
                  type: string
      required:
        - key
        - name
        - isPublic
        - createdAt
        - updatedAt

    Issue:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        state:
          type: string
          enum: [new, open, resolved, on_hold, invalid, duplicate, wontfix, closed]
        priority:
          type: string
          enum: [trivial, minor, major, critical, blocker]
        kind:
          type: string
          enum: [bug, enhancement, proposal, task]
        assignee:
          $ref: '#/components/schemas/User'
        reporter:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        repository:
          $ref: '#/components/schemas/Repository'
      required:
        - id
        - title
        - state
        - priority
        - kind
        - reporter
        - createdAt
        - updatedAt

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        pages:
          type: integer
        hasNext:
          type: boolean
        hasPrev:
          type: boolean
      required:
        - page
        - limit
        - total
        - pages
        - hasNext
        - hasPrev

    Branch:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        displayId:
          type: string
        type:
          type: string
        latestCommit:
          type: string
        isDefault:
          type: boolean
        repository:
          $ref: '#/components/schemas/Repository'
      required:
        - id
        - name
        - displayId
        - type
        - isDefault

    Tag:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        displayId:
          type: string
        type:
          type: string
        latestCommit:
          type: string
        message:
          type: string
        repository:
          $ref: '#/components/schemas/Repository'
      required:
        - id
        - name
        - displayId
        - type

    Commit:
      type: object
      properties:
        id:
          type: string
        displayId:
          type: string
        message:
          type: string
        author:
          $ref: '#/components/schemas/CommitAuthor'
        committer:
          $ref: '#/components/schemas/CommitAuthor'
        authorTimestamp:
          type: string
          format: date-time
        committerTimestamp:
          type: string
          format: date-time
        parents:
          type: array
          items:
            type: string
        repository:
          $ref: '#/components/schemas/Repository'
      required:
        - id
        - displayId
        - message
        - author
        - committer
        - authorTimestamp
        - committerTimestamp

    CommitAuthor:
      type: object
      properties:
        name:
          type: string
        emailAddress:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
        - name
        - emailAddress

    Comment:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        author:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        parent:
          $ref: '#/components/schemas/Comment'
        pullRequest:
          $ref: '#/components/schemas/PullRequest'
        issue:
          $ref: '#/components/schemas/Issue'
      required:
        - id
        - text
        - author
        - createdAt
        - updatedAt

    Webhook:
      type: object
      properties:
        uuid:
          type: string
        url:
          type: string
        description:
          type: string
        active:
          type: boolean
        events:
          type: array
          items:
            type: string
        subject:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - uuid
        - url
        - active
        - events
        - createdAt
        - updatedAt

    Pipeline:
      type: object
      properties:
        uuid:
          type: string
        buildNumber:
          type: integer
        creator:
          $ref: '#/components/schemas/User'
        target:
          type: object
        state:
          type: string
          enum: [PENDING, IN_PROGRESS, SUCCESSFUL, FAILED, STOPPED, PAUSED]
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        buildSecondsUsed:
          type: integer
        repository:
          $ref: '#/components/schemas/Repository'
      required:
        - uuid
        - buildNumber
        - creator
        - state
        - createdAt

    PipelineStep:
      type: object
      properties:
        uuid:
          type: string
        name:
          type: string
        state:
          type: string
          enum: [PENDING, IN_PROGRESS, SUCCESSFUL, FAILED, STOPPED, PAUSED]
        image:
          type: string
        script:
          type: string
        maxTime:
          type: integer
        buildTimeSeconds:
          type: integer
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
      required:
        - uuid
        - name
        - state
        - createdAt

    Snippet:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        scm:
          type: string
        isPrivate:
          type: boolean
        owner:
          $ref: '#/components/schemas/User'
        creator:
          $ref: '#/components/schemas/User'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - scm
        - isPrivate
        - owner
        - creator
        - createdAt
        - updatedAt

    SSHKey:
      type: object
      properties:
        uuid:
          type: string
        key:
          type: string
        label:
          type: string
        createdAt:
          type: string
          format: date-time
        lastUsed:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
      required:
        - uuid
        - key
        - label
        - createdAt
        - user

    GPGKey:
      type: object
      properties:
        keyId:
          type: string
        key:
          type: string
        createdAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
      required:
        - keyId
        - key
        - createdAt
        - user

    BranchRestriction:
      type: object
      properties:
        id:
          type: integer
        kind:
          type: string
        branchType:
          type: string
        branchMatchKind:
          type: string
        branchMatch:
          type: string
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        groups:
          type: array
          items:
            type: string
      required:
        - id
        - kind
        - branchType

    CommitStatus:
      type: object
      properties:
        key:
          type: string
        state:
          type: string
          enum: [SUCCESSFUL, FAILED, INPROGRESS, STOPPED]
        name:
          type: string
        description:
          type: string
        url:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - key
        - state
        - name
        - createdAt
        - updatedAt

    Deployment:
      type: object
      properties:
        uuid:
          type: string
        name:
          type: string
        key:
          type: string
        url:
          type: string
        state:
          type: string
          enum: [PENDING, IN_PROGRESS, SUCCESSFUL, FAILED, STOPPED]
        environment:
          type: object
        release:
          type: object
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - uuid
        - name
        - key
        - state
        - createdAt
        - updatedAt

    Download:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        size:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - name
        - path
        - size
        - createdAt