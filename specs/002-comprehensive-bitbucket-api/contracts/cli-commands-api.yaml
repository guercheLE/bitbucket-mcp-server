          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Lista de tags
          content:
            application/json:
              schema:
                type: object
                properties:
                  tags:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tag'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /cli/tag/create:
    post:
      summary: Criar tag
      description: Cria uma nova tag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Nome da tag
                startPoint:
                  type: string
                  description: Ponto de partida (commit ou branch)
                message:
                  type: string
                  description: Mensagem da tag
                workspace:
                  type: string
                  description: Workspace (Cloud) ou Project (Data Center)
                repository:
                  type: string
                  description: Nome do repositório
              required:
                - name
                - startPoint
                - workspace
                - repository
      responses:
        '201':
          description: Tag criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '400':
          description: Dados inválidos

  /cli/commit/list:
    get:
      summary: Listar commits
      description: Lista commits de um repositório
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
        - name: branch
          in: query
          schema:
            type: string
          description: Branch específica
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Lista de commits
          content:
            application/json:
              schema:
                type: object
                properties:
                  commits:
                    type: array
                    items:
                      $ref: '#/components/schemas/Commit'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /cli/commit/get:
    get:
      summary: Obter commit
      description: Obtém informações de um commit específico
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
        - name: commitId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Informações do commit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Commit'
        '404':
          description: Commit não encontrado

  /cli/webhook/list:
    get:
      summary: Listar webhooks (Cloud)
      description: Lista webhooks de um repositório
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de webhooks
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhooks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Webhook'
        '400':
          description: Operação não suportada (Data Center)

  /cli/webhook/create:
    post:
      summary: Criar webhook (Cloud)
      description: Cria um novo webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  description: URL do webhook
                description:
                  type: string
                  description: Descrição do webhook
                events:
                  type: array
                  items:
                    type: string
                  description: Eventos do webhook
                workspace:
                  type: string
                  description: Workspace
                repository:
                  type: string
                  description: Nome do repositório
              required:
                - url
                - events
                - workspace
                - repository
      responses:
        '201':
          description: Webhook criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '400':
          description: Dados inválidos ou operação não suportada (Data Center)

  /cli/pipeline/list:
    get:
      summary: Listar pipelines (Cloud)
      description: Lista pipelines de um repositório
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [PENDING, IN_PROGRESS, SUCCESSFUL, FAILED, STOPPED, PAUSED]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Lista de pipelines
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipelines:
                    type: array
                    items:
                      $ref: '#/components/schemas/Pipeline'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          description: Operação não suportada (Data Center)

  /cli/pipeline/get:
    get:
      summary: Obter pipeline (Cloud)
      description: Obtém informações de um pipeline específico
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
        - name: pipelineUuid
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Informações do pipeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pipeline'
        '404':
          description: Pipeline não encontrado
        '400':
          description: Operação não suportada (Data Center)

  /cli/snippet/list:
    get:
      summary: Listar snippets (Cloud)
      description: Lista snippets do usuário
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Lista de snippets
          content:
            application/json:
              schema:
                type: object
                properties:
                  snippets:
                    type: array
                    items:
                      $ref: '#/components/schemas/Snippet'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
