              schema:
                type: object
                properties:
                  sshKeys:
                    type: array
                    items:
                      $ref: '#/components/schemas/SSHKey'
        '400':
          description: Operação não suportada (Data Center)

  /cli/ssh-key/create:
    post:
      summary: Criar chave SSH (Cloud)
      description: Adiciona uma nova chave SSH
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
                  description: Chave SSH pública
                label:
                  type: string
                  description: Rótulo da chave
              required:
                - key
                - label
      responses:
        '201':
          description: Chave SSH criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SSHKey'
        '400':
          description: Dados inválidos ou operação não suportada (Data Center)

  /cli/gpg-key/list:
    get:
      summary: Listar chaves GPG (Cloud)
      description: Lista chaves GPG do usuário
      responses:
        '200':
          description: Lista de chaves GPG
          content:
            application/json:
              schema:
                type: object
                properties:
                  gpgKeys:
                    type: array
                    items:
                      $ref: '#/components/schemas/GPGKey'
        '400':
          description: Operação não suportada (Data Center)

  /cli/branch-restriction/list:
    get:
      summary: Listar restrições de branch (Cloud)
      description: Lista restrições de branch de um repositório
      parameters:
        - name: workspace
          in: query
          required: true
          schema:
            type: string
        - name: repository
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lista de restrições de branch
          content:
            application/json:
              schema:
                type: object
                properties:
                  restrictions:
                    type: array
                    items:
                      $ref: '#/components/schemas/BranchRestriction'
        '400':
